name: Deploy to own Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to own Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push database migrations (ignore Lovable-Cloud-only cron migrations)
        run: |
          # Mark Lovable-Cloud-specific cron migrations as already applied on customer DB
          # (they reference vault secrets + hardcoded URLs that only exist in Lovable Cloud)
          SKIP_MIGRATIONS=(
            "20260323141619"
            "20260616173345"
          )
          for mig in "${SKIP_MIGRATIONS[@]}"; do
            echo "Marking $mig as applied (skip) on remote..."
            supabase migration repair --status applied "$mig" --password "$SUPABASE_DB_PASSWORD" || true
          done
          supabase db push --password "$SUPABASE_DB_PASSWORD" --include-all || \
            supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
