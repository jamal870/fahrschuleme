[build]
  command = "bun install --frozen-lockfile && bun run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# 301-Redirect: alte Domain l-me.ch → neue Domain www.fahrschule-me.ch
# (Reihenfolge wichtig: host-basierte Redirects VOR dem SPA-Fallback)
[[redirects]]
  from = "https://l-me.ch/*"
  to = "https://www.fahrschule-me.ch/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.l-me.ch/*"
  to = "https://www.fahrschule-me.ch/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://l-me.ch/*"
  to = "https://www.fahrschule-me.ch/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.l-me.ch/*"
  to = "https://www.fahrschule-me.ch/:splat"
  status = 301
  force = true

# SPA fallback — auch wenn wir HashRouter nutzen,
# sorgt das dafür, dass direkte URL-Aufrufe immer index.html laden
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache statische Assets aggressiv
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
