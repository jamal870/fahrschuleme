# ---------- Host-Catch-All: drive-me.ch komplett ----------
[[redirects]]
  from = "https://drive-me.ch/*"
  to = "https://www.fahrschule-me.ch/:splat"
  status = 301
  force = true
[[redirects]]
  from = "https://www.drive-me.ch/*"
  to = "https://www.fahrschule-me.ch/:splat"
  status = 301
  force = true
[[redirects]]
  from = "http://drive-me.ch/*"
  to = "https://www.fahrschule-me.ch/:splat"
  status = 301
  force = true
[[redirects]]
  from = "http://www.drive-me.ch/*"
  to = "https://www.fahrschule-me.ch/:splat"
  status = 301
  force = true

# ---------- Alte Domain l-me.ch ----------
[[redirects]]
  from = "https://l-me.ch/*"
  to = "https://www.fahrschule-me.ch/:splat"
  status = 301
  force = true
[[redirects]]
  from = "https://www.l-me.ch/*"
  to = "https://www.fahrschule-me.ch/:splat"
  status = 301
  force = true
[[redirects]]
  from = "http://l-me.ch/*"
  to = "https://www.fahrschule-me.ch/:splat"
  status = 301
  force = true
[[redirects]]
  from = "http://www.l-me.ch/*"
  to = "https://www.fahrschule-me.ch/:splat"
  status = 301
  force = true

# SPA fallback — auch wenn wir HashRouter nutzen,
# sorgt das dafür, dass direkte URL-Aufrufe immer index.html laden
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache statische Assets aggressiv
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
