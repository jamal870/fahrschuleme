[build]
  command = "bun install --frozen-lockfile && bun run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# 301-Redirects: alte Domains → neue Domain www.fahrschule-me.ch
# Reihenfolge wichtig:
#   1) spezifische /redesign/*-Pfade (Pfad-Mapping)
#   2) Host-basierte Catch-Alls (alte Domains komplett umleiten)
#   3) SPA-Fallback ganz unten

# ---------- drive-me.ch /redesign/* → neue Pfade ----------
# Startseite
[[redirects]]
  from = "https://drive-me.ch/redesign"
  to = "https://www.fahrschule-me.ch/"
  status = 301
  force = true
[[redirects]]
  from = "https://drive-me.ch/redesign/"
  to = "https://www.fahrschule-me.ch/"
  status = 301
  force = true

# Motorrad
[[redirects]]
  from = "https://drive-me.ch/redesign/motorrad-2/*"
  to = "https://www.fahrschule-me.ch/motorrad"
  status = 301
  force = true
[[redirects]]
  from = "https://drive-me.ch/redesign/motorrad-2"
  to = "https://www.fahrschule-me.ch/motorrad"
  status = 301
  force = true

# Motorradführerschein Wettingen (SEO-Seite)
[[redirects]]
  from = "https://drive-me.ch/redesign/motorrad-fuhrerschein-wettingen/*"
  to = "https://www.fahrschule-me.ch/motorrad-fuehrerschein-wettingen"
  status = 301
  force = true
[[redirects]]
  from = "https://drive-me.ch/redesign/motorrad-fuhrerschein-wettingen"
  to = "https://www.fahrschule-me.ch/motorrad-fuehrerschein-wettingen"
